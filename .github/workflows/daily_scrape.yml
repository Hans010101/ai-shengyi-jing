name: 每日项目采集

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:        # 允许手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 赋予 commit 和 push 写入权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai

      - name: Run scraper
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd pipeline
          python3 scraper.py

      - name: Commit new data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ pipeline/drafts/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 自动更新：$(date '+%Y-%m-%d') 项目数据"
          git push
