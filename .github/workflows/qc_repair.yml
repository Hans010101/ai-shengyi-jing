name: 数据大盘质检修复

on:
  workflow_dispatch:        # 支持手动随时触发

jobs:
  qc-repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai

      - name: Run QC Repair
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd pipeline
          python3 qc_repair.py

      - name: Commit and Push Repaired Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git diff --quiet && git diff --staged --quiet \
            && echo "No changes to commit" \
            || (
              git commit -m "🔧 自动质检：修复低质量兜底项目数据"
              for i in {1..5}; do
                echo "Attempt $i to pull and push repaired data..."
                git pull --rebase origin main -X theirs || true
                if git push origin main; then
                  echo "QC Push successful!"
                  exit 0
                fi
                echo "QC Push failed, retrying in 5 seconds..."
                sleep 5
              done
              echo "All QC push attempts failed."
              exit 1
            )
