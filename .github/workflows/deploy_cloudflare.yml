name: 自动部署到 Cloudflare Pages

# NOTE: Cloudflare Pages 已通过官方 GitHub 集成自动部署（在 Cloudflare 控制台配置）
# 本 workflow 已停用，避免因 Secret 缺失导致 Actions 报错红叉。
# 所有推送到 main 的代码将由 Cloudflare Pages 的原生 GitHub 集成自动完成部署。

on:
  workflow_dispatch:  # 仅允许手动触发，不监听 push

jobs:
  skip:
    runs-on: ubuntu-latest
    steps:
      - name: ℹ️ 跳过 - Cloudflare Pages 使用原生 GitHub 集成自动部署
        run: |
          echo "==================================================="
          echo "✅ 部署由 Cloudflare Pages 官方集成完成，无需此 Action。"
          echo "   访问 https://dash.cloudflare.com 查看部署状态。"
          echo "==================================================="
